name: cart service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - "cart/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/cart-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "cart/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/cart-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -pl cart -am
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl cart -am -Dcheckstyle.output.file=cart-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/cart-checkstyle-result.xml'
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Cart-Service-Unit-Test-Results
          path: "cart/**/*-reports/TEST*.xml"
          reporter: java-junit
      # - name: OWASP Dependency Check
      #   if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
      #   uses: dependency-check/Dependency-Check_Action@main
      #   env:
      #     JAVA_HOME: /opt/jdk
      #   with:
      #     project: 'yas'
      #     path: '.'
      #     format: 'HTML'
      # - name: Upload OWASP Dependency Check results
      #   if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
      #   uses: actions/upload-artifact@master
      #   with:
      #     name: OWASP Dependency Check Report
      #     path: ${{github.workspace}}/reports
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}

      # BƯỚC 1.5: (DEBUG) Chạy thử Maven Tree bằng tay để xem Maven có tự build được không
      - name: Debug Maven Dependency Tree
        run: mvn dependency:tree -pl cart -am

      # BƯỚC 2: Chạy Snyk ở chế độ DEBUG (thêm cờ -d)
      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          # MAVEN_ARGS sẽ ép Maven luôn hiểu revision là 1.0-SNAPSHOT trong mọi lệnh quét
          MAVEN_ARGS: "-Drevision=1.0-SNAPSHOT" 
        run: |
          rm -f cart/mvnw cart/mvnw.cmd
          snyk test -d --severity-threshold=high --file=cart/pom.xml --project-name=yas-cart
        
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -pl cart -am
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/cart/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: 'Cart Coverage Report'
          update-comment: true
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./cart
          push: true
          tags: ghcr.io/nashtech-garage/yas-cart:latest
