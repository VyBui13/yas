name: cart service ci

on:
  push:
    # Đã thêm nhánh test vào danh sách kích hoạt luồng push
    branches: ["main", "feature/test-cd-cart"]
    paths:
      - "cart/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/cart-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "cart/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/cart-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      # Cập nhật thêm nhánh test vào biến môi trường để đảm bảo các bước scan code vẫn chạy bình thường
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/test-cd-cart' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      
      - uses: ./.github/workflows/actions
      
      - name: Run Maven Build Command
        run: mvn clean install -pl cart -am
      
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl cart -am -Dcheckstyle.output.file=cart-checkstyle-result.xml
      
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "**/cart-checkstyle-result.xml"
      
      - name: Upload Test and Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Cart-Service-Reports
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
          retention-days: 7
      
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Cart-Service-Unit-Test-Results
          path: "cart/**/*-reports/TEST*.xml"
          reporter: java-junit
      
      - name: Analyze with sonar cloud
        continue-on-error: true
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -pl cart -am
      
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/cart/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 60
          title: "Cart Coverage Report"
          update-comment: true

      # --- PHẦN CD BẮT ĐẦU TỪ ĐÂY ---
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/feature/test-cd-cart' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/feature/test-cd-cart' }}
        uses: docker/build-push-action@v6
        with:
          context: ./cart
          push: true
          tags: ghcr.io/${{ github.actor }}/yas-cart:test

      - name: Setup Kubeconfig
        if: ${{ github.ref == 'refs/heads/feature/test-cd-cart' }}
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Azure K3s using Helm
        if: ${{ github.ref == 'refs/heads/feature/test-cd-cart' }}
        run: |
          helm upgrade --install cart ./k8s/charts/cart \
            --namespace yas \
            --set image.repository=ghcr.io/${{ github.actor }}/yas-cart \
            --set image.tag=test
