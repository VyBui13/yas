name: Snyk Security Scan

on:
  push:
    branches: [ "main" ]
    # FIX YC6 - Monorepo: Chi chay khi co thay doi trong thu muc service
    paths:
      - 'cart/**'
      - 'media/**'
      - 'product/**'
      - 'order/**'
      - 'rating/**'
      - 'customer/**'
      - 'location/**'
      - 'inventory/**'
      - 'tax/**'
      - 'search/**'
      - 'payment/**'
      - 'payment-paypal/**'
      - 'promotion/**'
      - 'webhook/**'
      - 'recommendation/**'
  pull_request:
    branches: [ "main" ]
    # FIX YC6 - Monorepo: Chi chay khi co thay doi trong thu muc service
    paths:
      - 'cart/**'
      - 'media/**'
      - 'product/**'
      - 'order/**'
      - 'rating/**'
      - 'customer/**'
      - 'location/**'
      - 'inventory/**'
      - 'tax/**'
      - 'search/**'
      - 'payment/**'
      - 'payment-paypal/**'
      - 'promotion/**'
      - 'webhook/**'
      - 'recommendation/**'
  workflow_dispatch:
  # Chay scan dinh ky hang ngay luc nua dem UTC
  schedule:
    - cron: "0 0 * * *"

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - cart
          - media
          - product
          - order
          - rating
          - customer
          - location
          - inventory
          - tax
          - search
          - payment
          - payment-paypal
          - promotion
          - webhook
          - recommendation
    steps:
      - uses: actions/checkout@v4

      # FIX YC3 - Java LTS: Doi tu java-version 25 sang 21 (LTS, chuan du an YAS)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build ${{ matrix.service }}
        run: mvn clean install -DskipTests -pl ${{ matrix.service }} -am

      # FIX YC3 - Xoa continue-on-error: true de pipeline that su FAIL khi phat hien lo hong HIGH/CRITICAL
      # Truoc do: continue-on-error: true -> che giau loi, PR van duoc merge du co lo hong bao mat
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --severity-threshold=high
            --file=${{ matrix.service }}/pom.xml
            --project-name=yas-${{ matrix.service }}
            --sarif-file-output=snyk.sarif

      # Buoc nay chi upload ket qua len tab Security, khong anh huong viec block PR
      - name: Upload Snyk result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: snyk.sarif
