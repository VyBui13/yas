name: Snyk Security Scan

on:
  push:
    branches: [ "main" ]
    paths:
      - 'cart/**'
      - 'media/**'
      - 'product/**'
      - 'order/**'
      - 'rating/**'
      - 'customer/**'
      - 'location/**'
      - 'inventory/**'
      - 'tax/**'
      - 'search/**'
      - 'payment/**'
      - 'payment-paypal/**'
      - 'promotion/**'
      - 'webhook/**'
      - 'recommendation/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'cart/**'
      - 'media/**'
      - 'product/**'
      - 'order/**'
      - 'rating/**'
      - 'customer/**'
      - 'location/**'
      - 'inventory/**'
      - 'tax/**'
      - 'search/**'
      - 'payment/**'
      - 'payment-paypal/**'
      - 'promotion/**'
      - 'webhook/**'
      - 'recommendation/**'
  workflow_dispatch:
  # Chạy scan định kỳ hàng ngày lúc nửa đêm UTC
  schedule:
    - cron: "0 0 * * *"

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - cart
          - media
          - product
          - order
          - rating
          - customer
          - location
          - inventory
          - tax
          - search
          - payment
          - payment-paypal
          - promotion
          - webhook
          - recommendation
    steps:
      - uses: actions/checkout@v4

      # SỬA LỖI 3: Đổi Java 25 → Java 21 (LTS, chuẩn của dự án YAS)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build ${{ matrix.service }}
        run: mvn clean install -DskipTests -pl ${{ matrix.service }} -am

      # SỬA LỖI 1: Xóa continue-on-error để pipeline thực sự fail khi có lỗ hổng HIGH/CRITICAL
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --severity-threshold=high
            --file=${{ matrix.service }}/pom.xml
            --project-name=yas-${{ matrix.service }}
            --sarif-file-output=snyk.sarif

      - name: Upload Snyk result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: snyk.sarif
