name: Snyk Security Scan

# Trigger khi có push hoặc PR vào main
# Không dùng "paths:" để quét TOÀN BỘ repo (đúng yêu cầu đồ án II.7.c)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Chạy Snyk từ ROOT pom.xml → giải quyết được biến ${revision}
      # Không có continue-on-error → đúng yêu cầu II.3 (CI must pass to merge)
      # Không dùng --file=cart/pom.xml riêng lẻ → tránh lỗi exit code -13
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: >-
            --severity-threshold=high
            --file=pom.xml
            --all-projects
            --project-name=yas
