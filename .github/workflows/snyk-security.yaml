name: Snyk Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Bước 1: Cài root POM vào ~/.m2 (giải quyết ${revision})
      - name: Install root POM to local Maven repo
        run: mvn install -N -DskipTests

      # Bước 2: Pre-warm Maven cache cho toàn bộ dependencies
      # Giải quyết exit code -13 (Maven bị kill do thiếu deps khi Snyk quét từng module)
      - name: Pre-warm Maven dependency cache
        run: mvn dependency:go-offline -q --no-transfer-progress
        continue-on-error: true

      - name: Install Snyk CLI
        run: npm install -g snyk

      # --all-projects: quét cả Maven lẫn npm
      # --severity-threshold=high: chặn merge nếu có lỗ hổng High/Critical
      # .snyk policy file: ignore các CVE đã biết của dự án
      - name: Run Snyk to check for vulnerabilities
        run: snyk test --severity-threshold=high --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
