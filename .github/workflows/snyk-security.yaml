name: Snyk Security Scan

# Trigger khi có push hoặc PR vào main.
# KHÔNG dùng "paths:" vì đây là security scan → quét toàn bộ repo (đúng yêu cầu II.7.c)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 21 đúng với yêu cầu đồ án (không dùng Java 25)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Chạy Snyk từ ROOT → giải quyết biến ${revision} trong pom.xml con
      # --all-projects: Snyk tự tìm và quét tất cả module con
      # KHÔNG có continue-on-error → đúng yêu cầu II.3 (CI fail nếu có lỗ hổng HIGH)
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: >-
            --severity-threshold=high
            --all-projects
