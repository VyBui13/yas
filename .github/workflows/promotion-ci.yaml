name: promotion service ci

on:
  push:
    branches: ["**"] # Kích hoạt trên mọi nhánh để tự động build và push ảnh với tag commit SHA lên Docker Hub
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -pl promotion -am
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl promotion -am -Dcheckstyle.output.file=promotion-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/promotion-checkstyle-result.xml'
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Promotion-Service-Unit-Test-Results
          path: "promotion/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Analyze with sonar cloud
        continue-on-error: true
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f promotion
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/promotion/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: 'Promotion Coverage Report'
          update-comment: true
      # --- PHẦN CD MỚI: BUILD VÀ PUSH LÊN DOCKER HUB VỚI TAG COMMIT SHA ---
      - name: Get short SHA
        if: ${{ github.ref != 'refs/heads/main' }}
        id: slug
        run: echo "sha=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Log in to Docker Hub
        if: ${{ github.ref != 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker images (Docker Hub)
        if: ${{ github.ref != 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./promotion
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/yas-promotion:${{ steps.slug.outputs.sha }}

