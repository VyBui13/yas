name: backoffice service ci

on:
push:
# Kích hoạt trên mọi nhánh để tự động build và push ảnh với tag commit SHA lên Docker Hub
branches: ["**"]
paths:
- "backoffice/**"
- ".github/workflows/actions/action.yaml"
- ".github/workflows/backoffice-ci.yaml"
pull_request:
branches: ["main"]
paths:
- "backoffice/**"
- ".github/workflows/actions/action.yaml"
- ".github/workflows/backoffice-ci.yaml"
workflow_dispatch:

jobs:
Build:
runs-on: ubuntu-latest
env:
# Cập nhật để hỗ trợ quét kiểm tra code trên mọi nhánh thuộc repo chính
FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.repository == 'VyBui13/yas' }}

```
steps:
  - uses: actions/checkout@v4
    with:
      fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

  - uses: actions/setup-node@v4
    with:
      node-version: 20

  - run: npm ci
    working-directory: backoffice

  - run: npm run build
    working-directory: backoffice

  - run: npm run lint
    working-directory: backoffice

  - run: npx prettier --check .
    working-directory: backoffice

  - run: npm audit --omit=dev
    continue-on-error: true
    working-directory: backoffice

  - name: Run Trivy vulnerability scanner
    uses: aquasecurity/trivy-action@master
    with:
      scan-type: "fs"
      scan-ref: "./backoffice"
      format: "sarif"
      output: "trivy-results.sarif"

  - name: SonarCloud Scan
    continue-on-error: true
    if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
    uses: SonarSource/sonarcloud-github-action@master
    with:
      projectBaseDir: backoffice
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # --- PHẦN CD MÔI TRƯỜNG MAIN (ĐẨY LÊN GHCR) ---
  - name: Log in to the Container registry
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  - name: Build Docker image
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: docker/build-push-action@v6
    with:
      context: ./backoffice
      tags: ghcr.io/vybui13/yas-backoffice:latest

  - name: Run Trivy vulnerability scanner
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: aquasecurity/trivy-action@master
    with:
      image-ref: "ghcr.io/vybui13/yas-backoffice:latest"
      format: "sarif"
      output: "trivy-results.sarif"

  - name: Push Docker image
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: docker/build-push-action@v6
    with:
      push: true
      context: ./backoffice
      tags: ghcr.io/vybui13/yas-backoffice:latest

  - name: Upload Trivy scan results to GitHub Security tab
    uses: github/codeql-action/upload-sarif@v3
    with:
      sarif_file: "trivy-results.sarif"

  # --- PHẦN CD MÔI TRƯỜNG TEST (ĐẨY LÊN DOCKER HUB & DEPLOY K3S) ---
  - name: Get short SHA
    if: ${{ github.ref != 'refs/heads/main' }}
    id: slug
    run: echo "sha=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

  - name: Log in to Docker Hub
    if: ${{ github.ref != 'refs/heads/main' }}
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build and push Docker images (Docker Hub)
    if: ${{ github.ref != 'refs/heads/main' }}
    uses: docker/build-push-action@v6
    with:
      context: ./backoffice
      push: true
      tags: ${{ secrets.DOCKER_USERNAME }}/yas-backoffice:${{ steps.slug.outputs.sha }}
```
