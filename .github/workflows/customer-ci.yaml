name: customer service ci

on:
push:
# Kích hoạt trên mọi nhánh để tự động build và push ảnh với tag commit SHA lên Docker Hub
branches: ["**"]
paths:
- "customer/**"
- ".github/workflows/actions/action.yaml"
- ".github/workflows/customer-ci.yaml"
- "pom.xml"
pull_request:
branches: ["main"]
paths:
- "customer/**"
- ".github/workflows/actions/action.yaml"
- ".github/workflows/customer-ci.yaml"
- "pom.xml"
workflow_dispatch:

jobs:
Build:
runs-on: ubuntu-latest
env:
# Cập nhật để hỗ trợ quét kiểm tra code trên mọi nhánh thuộc repo chính
FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.repository == 'VyBui13/yas' }}

```
steps:
  - uses: actions/checkout@v4
    with:
      fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

  - uses: ./.github/workflows/actions

  - name: Run Maven Build Command
    run: mvn clean install -pl customer -am

  - name: Run Maven Checkstyle
    if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
    run: mvn checkstyle:checkstyle -pl customer -am -Dcheckstyle.output.file=customer-checkstyle-result.xml

  - name: Upload Checkstyle Result
    if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
    uses: jwgmeligmeyling/checkstyle-github-action@master
    with:
      path: "**/customer-checkstyle-result.xml"

  - name: Upload Test and Coverage Reports
    uses: actions/upload-artifact@v4
    if: always()
    with:
      name: Customer-Service-Reports
      path: |
        **/target/surefire-reports/
        **/target/site/jacoco/
      retention-days: 7

  - name: Test Results
    uses: dorny/test-reporter@v1
    if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
    with:
      name: Customer-Service-Unit-Test-Results
      path: "customer/**/*-reports/TEST*.xml"
      reporter: java-junit

  - name: Analyze with sonar cloud
    continue-on-error: true
    if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f customer

  - name: Add coverage report to PR
    uses: madrapps/jacoco-report@v1.6.1
    if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
    with:
      paths: ${{github.workspace}}/customer/target/site/jacoco/jacoco.xml
      token: ${{secrets.GITHUB_TOKEN}}
      min-coverage-overall: 70
      min-coverage-changed-files: 60
      title: "Customer Coverage Report"
      update-comment: true

  # --- PHẦN CD MÔI TRƯỜNG MAIN (ĐẨY LÊN GHCR) ---
  - name: Log in to the Container registry
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  - name: Build and push Docker images (GHCR)
    if: ${{ github.ref == 'refs/heads/main' }}
    uses: docker/build-push-action@v6
    with:
      context: ./customer
      push: true
      tags: ghcr.io/vybui13/yas-customer:latest

  # --- PHẦN CD MÔI TRƯỜNG TEST (ĐẨY LÊN DOCKER HUB & DEPLOY K3S) ---
  - name: Get short SHA
    if: ${{ github.ref != 'refs/heads/main' }}
    id: slug
    run: echo "sha=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

  - name: Log in to Docker Hub
    if: ${{ github.ref != 'refs/heads/main' }}
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build and push Docker images (Docker Hub)
    if: ${{ github.ref != 'refs/heads/main' }}
    uses: docker/build-push-action@v6
    with:
      context: ./customer
      push: true
      tags: ${{ secrets.DOCKER_USERNAME }}/yas-customer:${{ steps.slug.outputs.sha }}
```
