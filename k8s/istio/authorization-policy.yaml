apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: cart-auth-policy
  namespace: yas
spec:
  selector:
    matchLabels:
      app: cart
  action: ALLOW
  rules:
  - from:
    - source:
        principals: 
        - "cluster.local/ns/yas/sa/storefront-bff"
        - "cluster.local/ns/yas/sa/backoffice-bff"
